name: E3NN

search_space:
  num_hidden_layers:
    type: categorical
    values: [1, 2, 3]
    path: model.backbone.num_hidden_layers

  num_hidden_channels:
    type: categorical
    values: [8, 16, 32, 64, 128]
    path: model.backbone.num_hidden_channels

  lmax:
    type: categorical
    values: [1, 2]
    path: model.backbone.lmax

  multiplicity:
    type: categorical
    values: [1, 2, 4]
    path: model.backbone.multiplicity

  radial_mlp_layers:
    type: categorical
    values: [1, 2, 3]
    path: model.backbone.radial_mlp_layers

  radial_mlp_hidden_dim:
    type: categorical
    values: [8, 16, 32, 64]
    path: model.backbone.radial_mlp_hidden_dim

  num_MLP_layers:
    type: categorical
    values: [1, 2, 3, 4, 5, 6]
    path: model.backbone.num_MLP_layers

  lr:
    type: categorical
    values: [1E-5, 5E-5, 1E-4, 5E-4, 1E-3]
    path: train.optimizer.lr

  weight_decay:
    type: categorical
    values: [0, 1E-5, 1E-4, 1E-3, 1E-2]
    path: train.optimizer.weight_decay

  batch_size:
    type: categorical
    values: [2, 4, 8, 16, 32]
    paths:
      - dataset.dataset.batch_size.train