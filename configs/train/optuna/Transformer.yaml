name: Transformer

search_space:
  num_hidden_layers:
    type: categorical
    values: [1, 2, 3, 4, 5, 6]
    path: model.backbone.num_hidden_layers

  num_hidden_channels:
    type: categorical
    values: [32, 64, 128, 256, 512]
    path: model.backbone.num_hidden_channels

  num_heads:
    type: categorical
    values: [1, 2, 4, 8]
    path: model.backbone.num_heads

  num_MLP_layers:
    type: categorical
    values: [1, 2, 3, 4, 5, 6]
    path: model.backbone.num_MLP_layers

  lr:
    type: categorical
    values: [1E-5, 5E-5, 1E-4, 5E-4, 1E-3, 5E-3, 1E-2]
    path: train.optimizer.lr

  weight_decay:
    type: categorical
    values: [0, 1E-5, 5E-5, 1E-4, 5E-4, 1E-3]
    path: train.optimizer.weight_decay

  batch_size:
    type: categorical
    values: [2, 4, 8, 16, 32, 64, 128]
    paths:
      - dataset.dataset.batch_size.train